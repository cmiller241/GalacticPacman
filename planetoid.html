<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stable Multi-Planetoid Platformer</title>
<style>
body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #fff;
}
canvas {
    border: 1px solid #000;
}
</style>
</head>
<body>
<canvas id="gameCanvas" width="900" height="650"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// =======================
// Constants
// =======================
const GRAVITY_STRENGTH = 0.35;
const JUMP_STRENGTH = 9;
const MOVE_SPEED = 0.05;
const PLAYER_RADIUS = 10;
const INFLUENCE_PADDING = 140;
const SURFACE_TOLERANCE = 4;
const DRAG = 0.995;

// =======================
// Vector2
// =======================
class Vector2 {
    constructor(x = 0, y = 0) {
        this.x = x;
        this.y = y;
    }

    add(v) {
        this.x += v.x;
        this.y += v.y;
        return this;
    }

    subtract(v) {
        return new Vector2(this.x - v.x, this.y - v.y);
    }

    multiply(s) {
        return new Vector2(this.x * s, this.y * s);
    }

    length() {
        return Math.sqrt(this.x * this.x + this.y * this.y);
    }

    normalize() {
        const len = this.length();
        if (len > 0) {
            this.x /= len;
            this.y /= len;
        }
        return this;
    }

    clone() {
        return new Vector2(this.x, this.y);
    }

    dot(v) {
        return this.x * v.x + this.y * v.y;
    }
}

// =======================
// Planetoid
// =======================
class Planetoid {
    constructor(x, y, radius, color) {
        this.pos = new Vector2(x, y);
        this.radius = radius;
        this.influenceRadius = radius + INFLUENCE_PADDING;
        this.color = color;
    }

    draw() {
        // Influence ring
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, this.influenceRadius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Planet
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

// =======================
// Player
// =======================
class Player {
    constructor(x, y) {
        this.pos = new Vector2(x, y);
        this.vel = new Vector2(0, 0);
        this.radius = PLAYER_RADIUS;
        this.onSurface = false;
        this.currentPlanet = null;
        this.lastInfluencePlanet = null;
        this.angle = 0;
    }

    findDominantPlanet(planets) {
        let closest = null;
        let minDist = Infinity;

        for (const planet of planets) {
            const dist = this.pos.subtract(planet.pos).length();
            if (dist < planet.influenceRadius && dist < minDist) {
                minDist = dist;
                closest = planet;
            }
        }

        return closest;
    }

    applyGravity(planets) {
        if (this.onSurface) return;

        let planet = this.findDominantPlanet(planets);

        // If none found, fall back to last planet that influenced us
        if (!planet && this.lastInfluencePlanet) {
            planet = this.lastInfluencePlanet;
        }

        if (planet) {
            this.lastInfluencePlanet = planet;

            const direction = planet.pos.subtract(this.pos).normalize();
            this.vel.add(direction.multiply(GRAVITY_STRENGTH));
        }
    }

    checkCollision(planets) {
        for (const planet of planets) {
            const offset = this.pos.subtract(planet.pos);
            const dist = offset.length();
            const surfaceDist = planet.radius + this.radius;

            if (dist <= surfaceDist + SURFACE_TOLERANCE) {
                const normal = offset.normalize();

                this.pos = planet.pos.clone().add(
                    normal.multiply(surfaceDist)
                );

                this.onSurface = true;
                this.currentPlanet = planet;
                this.lastInfluencePlanet = planet;

                this.vel.x = 0;
                this.vel.y = 0;

                this.angle = Math.atan2(
                    this.pos.y - planet.pos.y,
                    this.pos.x - planet.pos.x
                );

                return;
            }
        }

        this.onSurface = false;
        this.currentPlanet = null;
    }

    move(keys) {
        if (this.onSurface && this.currentPlanet) {
            if (keys['ArrowLeft']) this.angle -= MOVE_SPEED;
            if (keys['ArrowRight']) this.angle += MOVE_SPEED;

            const surfaceDist = this.currentPlanet.radius + this.radius;

            this.pos.x =
                this.currentPlanet.pos.x +
                Math.cos(this.angle) * surfaceDist;

            this.pos.y =
                this.currentPlanet.pos.y +
                Math.sin(this.angle) * surfaceDist;
        }
    }

    jump() {
        if (this.onSurface && this.currentPlanet) {
            const direction = this.pos
                .subtract(this.currentPlanet.pos)
                .normalize();

            this.vel = direction.multiply(JUMP_STRENGTH);
            this.onSurface = false;
            this.currentPlanet = null;
        }
    }

    update() {
        if (!this.onSurface) {
            this.vel = this.vel.multiply(DRAG);
            this.pos.add(this.vel);
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'red';
        ctx.fill();
    }
}

// =======================
// Game Setup
// =======================
const planetoids = [
    new Planetoid(300, 350, 60, 'blue'),
    new Planetoid(600, 250, 45, 'green'),
    new Planetoid(700, 500, 35, 'purple'),
    new Planetoid(150, 200, 50, 'orange'),
    new Planetoid(450, 500, 70, 'yellow'),
    new Planetoid(800, 100, 30, 'red'),
    new Planetoid(200, 500, 40, 'cyan')
];

const player = new Player(300, 350 - 60 - PLAYER_RADIUS);
player.lastInfluencePlanet = planetoids[0];

const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === ' ') player.jump();
});
window.addEventListener('keyup', (e) => {
    keys[e.key] = false;
});

// =======================
// Game Loop
// =======================
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    player.move(keys);
    player.applyGravity(planetoids);
    player.update();
    player.checkCollision(planetoids);

    planetoids.forEach(p => p.draw());
    player.draw();

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>

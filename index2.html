<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Donkey Kong Demo</title>
    <style>
        body { margin: 0; background: #000; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 3;
        const CLIMB_SPEED = 2;
        const WALK_ANIM_SPEED = 0.15;

        // Sprite and hitbox constants
        const SPRITE_SOURCE_SIZE = 30;
        const SPRITE_SCALE = 2; // Adjust this to make the sprite bigger (e.g., 1.5 or 2)
        const SPRITE_DRAW_WIDTH = SPRITE_SOURCE_SIZE * SPRITE_SCALE;
        const SPRITE_DRAW_HEIGHT = SPRITE_SOURCE_SIZE * SPRITE_SCALE;
        const HITBOX_WIDTH = 15; // Unchanged for collision
        const HITBOX_HEIGHT = 30; // Unchanged for collision

        // Load hero sprite
        const heroImg = new Image();
        heroImg.src = 'img/herosprites.png';

        // Load platform sprite
        const platformImg = new Image();
        platformImg.src = 'img/platform.png';

        // Load Satan Kong sprite
        const satanImg = new Image();
        satanImg.src = 'img/satan.png';

        let assetsToLoad = 3;
        let assetsLoaded = false;

        heroImg.onload = () => {
            assetsToLoad--;
            if (assetsToLoad === 0) assetsLoaded = true;
        };

        platformImg.onload = () => {
            assetsToLoad--;
            if (assetsToLoad === 0) assetsLoaded = true;
        };

        satanImg.onload = () => {
            assetsToLoad--;
            if (assetsToLoad === 0) assetsLoaded = true;
        };

        // Player (Mario)
        let player = {
            x: 100,
            y: 520,
            width: HITBOX_WIDTH,
            height: HITBOX_HEIGHT,
            vx: 0,
            vy: 0,
            onGround: false,
            climbing: false,
            facing: 1,
            frame: 0,
            frameTimer: 0
        };

        // Platforms (simple rectangular platforms, height adjusted to 15 for sprite)
        let platforms = [
            { x: 0, y: 550, width: 800, height: 15, color: 'gray' }, // Ground
            { x: 100, y: 450, width: 200, height: 15, color: 'gray' },
            { x: 400, y: 350, width: 300, height: 15, color: 'gray' },
            { x: 200, y: 250, width: 150, height: 15, color: 'gray' },
            { x: 500, y: 150, width: 200, height: 15, color: 'gray' }
        ];

        // Ladders (rectangular areas where player can climb)
        let ladders = [
            { x: 150, y: 450, width: 20, height: 100, color: 'blue' }, // Ladder from platform 1 to ground
            { x: 450, y: 350, width: 20, height: 100, color: 'blue' }, // Ladder from platform 2 to platform 1
            { x: 250, y: 250, width: 20, height: 100, color: 'blue' }, // Ladder from platform 3 to platform 2
            { x: 550, y: 150, width: 20, height: 100, color: 'blue' }  // Ladder from platform 4 to platform 3
        ];

        // Donkey Kong (static for now, using sprite at top)
        let dk = {
            x: 600,
            y: 100,
            width: 60,
            height: 70
        };

        // Simple barrel (one rolling barrel for demo)
        let barrel = {
            x: 600,
            y: 130,
            radius: 10,
            vx: -2,
            vy: 0,
            color: 'orange',
            onGround: false
        };

        // Keyboard input
        let keys = {};
        window.addEventListener('keydown', (e) => { keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // Check if player is on a ladder
        function isOnLadder() {
            for (let ladder of ladders) {
                if (player.x + player.width > ladder.x && player.x < ladder.x + ladder.width &&
                    player.y + player.height > ladder.y && player.y < ladder.y + ladder.height) {
                    return true;
                }
            }
            return false;
        }

        // Collision detection with platforms
        function checkPlatformCollision(oldY) {
            player.onGround = false;
            for (let platform of platforms) {
                let oldBottom = oldY + player.height;
                let newBottom = player.y + player.height;
                if (player.vy >= 0 && 
                    player.x + player.width > platform.x && player.x < platform.x + platform.width &&
                    oldBottom <= platform.y && newBottom >= platform.y) {
                    player.y = platform.y - player.height;
                    player.vy = 0;
                    player.onGround = true;
                }
            }
        }

        // Barrel collision with platforms (simple)
        function checkBarrelPlatformCollision(oldBarrelY) {
            barrel.onGround = false;
            for (let platform of platforms) {
                let oldBottom = oldBarrelY + barrel.radius;
                let newBottom = barrel.y + barrel.radius;
                if (barrel.vy >= 0 &&
                    barrel.x > platform.x && barrel.x < platform.x + platform.width &&
                    oldBottom <= platform.y && newBottom >= platform.y) {
                    barrel.y = platform.y - barrel.radius;
                    barrel.vy = 0;
                    barrel.onGround = true;
                }
            }
        }

        // Check player-barrel collision (simple bounding box)
        function checkPlayerBarrelCollision() {
            if (player.x + player.width > barrel.x - barrel.radius && player.x < barrel.x + barrel.radius &&
                player.y + player.height > barrel.y - barrel.radius && player.y < barrel.y + barrel.radius) {
                // Reset player on collision (simple death)
                player.x = 100;
                player.y = 520;
                player.vx = 0;
                player.vy = 0;
                player.frame = 0;
                player.frameTimer = 0;
            }
        }

        // Update game state
        function update() {
            // Player movement
            player.vx = 0;
            if (keys['ArrowLeft']) player.vx = -MOVE_SPEED;
            if (keys['ArrowRight']) player.vx = MOVE_SPEED;

            // Update facing
            if (player.vx > 0) player.facing = 1;
            else if (player.vx < 0) player.facing = -1;

            // Climbing
            player.climbing = isOnLadder();
            if (player.climbing) {
                player.vx = 0; // No horizontal movement on ladder
                player.vy = 0; // No gravity while climbing
                if (keys['ArrowUp']) player.y -= CLIMB_SPEED;
                if (keys['ArrowDown']) player.y += CLIMB_SPEED;
            } else {
                player.vy += GRAVITY; // Apply gravity
            }

            // Jumping
            if (keys['ArrowUp'] && player.onGround && !player.climbing) {
                player.vy = JUMP_FORCE;
                player.onGround = false;
            }

            // Animation
            if (player.climbing) {
                player.frame = 0;
            } else if (!player.onGround) {
                player.frame = 1; // Jump frame
            } else {
                if (Math.abs(player.vx) > 0) {
                    // Walking animation
                    player.frameTimer += WALK_ANIM_SPEED;
                    if (player.frameTimer >= 1) {
                        player.frameTimer -= 1;
                        player.frame = (player.frame + 1) % 4;
                    }
                } else {
                    player.frame = 0; // Idle
                }
            }

            // Update position
            let oldY = player.y;
            player.x += player.vx;
            player.y += player.vy;

            // Barrel movement (simple left roll, falls if no platform)
            barrel.x += barrel.vx;
            let oldBarrelY = barrel.y;
            if (!barrel.onGround) barrel.vy += GRAVITY;
            else barrel.vy = 0;
            barrel.y += barrel.vy;

            // Barrel reset if off screen
            if (barrel.x < 0 || barrel.y > canvas.height) {
                barrel.x = 600;
                barrel.y = 130;
                barrel.vy = 0;
            }

            // Collisions
            checkPlatformCollision(oldY);
            checkBarrelPlatformCollision(oldBarrelY);
            checkPlayerBarrelCollision();

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y > canvas.height) {
                player.y = 520; // Reset if fall off
            }
        }

        // Draw everything
        function draw() {
            ctx.fillStyle = "#1e1e2f"; // dark blue / purple
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw platforms with tiled sprite
            for (let platform of platforms) {
                const tileWidth = 30;
                const tileHeight = 15;
                const numTiles = Math.ceil(platform.width / tileWidth);
                for (let i = 0; i < numTiles; i++) {
                    const drawWidth = Math.min(tileWidth, platform.width - i * tileWidth);
                    ctx.drawImage(platformImg, 0, 0, drawWidth, tileHeight, platform.x + i * tileWidth, platform.y, drawWidth, tileHeight);
                }
            }

            // Draw ladders
            for (let ladder of ladders) {
                ctx.fillStyle = ladder.color;
                ctx.fillRect(ladder.x, ladder.y, ladder.width, ladder.height);
            }

            // Draw Satan Kong (first frame, standing)
            ctx.drawImage(satanImg, 0, 0, 60, 70, dk.x, dk.y, dk.width, dk.height);

            // Draw barrel
            ctx.fillStyle = barrel.color;
            ctx.beginPath();
            ctx.arc(barrel.x, barrel.y, barrel.radius, 0, Math.PI * 2);
            ctx.fill();

            // Draw player sprite (aligned so visual bottom matches hitbox bottom)
            ctx.save();
            const centerX = player.x + player.width / 2;
            const bottomY = player.y + player.height;
            ctx.translate(centerX, bottomY);
            if (player.facing === -1) {
                ctx.scale(-1, 1);
            }
            ctx.drawImage(heroImg, player.frame * SPRITE_SOURCE_SIZE, 0, SPRITE_SOURCE_SIZE, SPRITE_SOURCE_SIZE, -SPRITE_DRAW_WIDTH / 2, -SPRITE_DRAW_HEIGHT, SPRITE_DRAW_WIDTH, SPRITE_DRAW_HEIGHT);
            ctx.restore();
        }

        // Game loop
        function gameLoop() {
            if (!assetsLoaded) {
                requestAnimationFrame(gameLoop);
                return;
            }
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>

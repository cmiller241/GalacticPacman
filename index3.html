/* ================= COLLISION HELPERS ================= */

function getTileAt(worldX, worldY) {
    const tx = Math.floor(worldX / worldTileSize);
    const ty = Math.floor(worldY / worldTileSize);
    if (tx < 0 || tx >= mapWidth || ty < 0 || ty >= mapHeight) return 0;
    return map[tx + ty * mapWidth];
}

function isSolid(tile) {
    return tile > 23;   // same rule as your water.html (solid platforms, etc.)
}

function getCollider(entity) {
    const centerX = entity.x + entity.width / 2;
    const feetY = entity.y + entity.height;

    return {
        left: centerX - entity.colliderHalfWidth,
        right: centerX + entity.colliderHalfWidth,
        top: feetY - entity.colliderHeight,
        bottom: feetY
    };
}

function drawCollider(entity) {
    if (!DEBUG_COLLIDERS) return;
    const c = getCollider(entity);
    ctx.strokeStyle = 'red';
    ctx.lineWidth = 2;
    ctx.strokeRect(
        c.left - cameraX,
        c.top - cameraY,
        c.right - c.left,
        c.bottom - c.top
    );
}

/* ================= DRAW HELPERS ================= */

function drawFlipped(img, sx, sy, sw, sh, dx, dy, dw, dh, facingRight) {
    dx = Math.round(dx);
    dy = Math.round(dy);

    ctx.save();
    if (!facingRight) {
        ctx.translate(dx + dw, dy);
        ctx.scale(-1, 1);
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, dw, dh);
    } else {
        ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
    }
    ctx.restore();
}

function drawTiles() {
    const firstTileX = Math.floor(cameraX / worldTileSize);
    const firstTileY = Math.floor(cameraY / worldTileSize);
    const offsetX = cameraX % worldTileSize;
    const offsetY = cameraY % worldTileSize;

    const tilesAcross = Math.ceil(VIRTUAL_WIDTH / worldTileSize) + 2;
    const tilesDown   = Math.ceil(VIRTUAL_HEIGHT / worldTileSize) + 2;

    for (let x = 0; x < tilesAcross; x++) {
        for (let y = 0; y < tilesDown; y++) {
            const mapX = firstTileX + x;
            const mapY = firstTileY + y;
            if (mapX < 0 || mapX >= mapWidth || mapY < 0 || mapY >= mapHeight) continue;

            const tileIndex = map[mapX + mapY * mapWidth];
            if (tileIndex === 0) continue;

            const col = (tileIndex - 1) % sheetCol;
            const row = Math.floor((tileIndex - 1) / sheetCol);

            const sourceX = col * originalTileWidth;
            const sourceY = row * originalTileHeight;

            ctx.drawImage(
                tilesheet,
                sourceX, sourceY, originalTileWidth, originalTileHeight,   // source = 16x16
                x * worldTileSize - offsetX,
                y * worldTileSize - offsetY,
                worldTileSize, worldTileSize                                // dest = 280x280
            );
        }
    }
}

function drawShepherd() {
    let col = 0;
    if (!shepherd.onGround) col = 7;
    else if (Math.abs(shepherd.vx) > 0.5) col = 1 + shepherd.walkFrame;

    drawFlipped(
        shepherdImg,
        col * spriteWidth,
        0,
        spriteWidth,
        spriteHeight,
        shepherd.x - cameraX,
        shepherd.y - cameraY,
        drawSize,
        drawSize,
        shepherd.direction === 'right'
    );

    drawCollider(shepherd);
}

function drawOneSheep(s) {
    const cols = 4;
    const row = Math.floor(s.frameIndex / cols);
    const col = s.frameIndex % cols;
    const shouldFaceRight = s.vx > 0;

    drawFlipped(
        sheepImg,
        col * spriteWidth,
        row * spriteHeight,
        spriteWidth,
        spriteHeight,
        s.x - cameraX,
        s.y - cameraY,
        drawSize,
        drawSize,
        !shouldFaceRight
    );

    drawCollider(s);
}

/* ================= GAME LOOP ================= */

function update(timestamp) {
    if (!timestamp) timestamp = 0;

    /* ----- SHEPHERD INPUT & PHYSICS ----- */
    shepherd.vx = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        shepherd.vx = -WALK_SPEED;
        shepherd.direction = 'left';
    }
    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        shepherd.vx = WALK_SPEED;
        shepherd.direction = 'right';
    }

    if ((keys[' '] || keys['Spacebar']) && shepherd.onGround) {
        shepherd.vy = JUMP_FORCE;
        shepherd.onGround = false;
        keys[' '] = false;   // prevent repeat jump
    }

    /* horizontal movement + simple wall collision */
    shepherd.x += shepherd.vx;

    const feetMidY = shepherd.y + shepherd.height - 20;
    if (shepherd.vx > 0) {
        if (isSolid(getTileAt(shepherd.x + shepherd.width - 10, feetMidY))) {
            shepherd.x = Math.floor((shepherd.x + shepherd.width) / tileWidth) * tileWidth - shepherd.width + 10;
            shepherd.vx = 0;
        }
    } else if (shepherd.vx < 0) {
        if (isSolid(getTileAt(shepherd.x + 10, feetMidY))) {
            shepherd.x = Math.ceil(shepherd.x / tileWidth) * tileWidth - 10;
            shepherd.vx = 0;
        }
    }

    /* vertical movement + gravity + landing / ceiling collision */
    shepherd.vy += GRAVITY;
    shepherd.y += shepherd.vy;

    // === VERTICAL COLLISION (now works with big scaled tiles) ===
    if (shepherd.vy >= 0) { // falling or standing still
        const footY = shepherd.y + shepherd.height;
        const footLeftTile  = getTileAt(shepherd.x + 20, footY);
        const footRightTile = getTileAt(shepherd.x + shepherd.width - 20, footY);

        if (isSolid(footLeftTile) || isSolid(footRightTile)) {
            // Snap the BOTTOM of the shepherd exactly to the TOP of the tile
            const tileTop = Math.floor(footY / worldTileSize) * worldTileSize;
            shepherd.y = tileTop - shepherd.height;
            shepherd.vy = 0;
            shepherd.onGround = true;
        } else {
            shepherd.onGround = false;
        }
    } 
    else { // jumping upward (ceiling check)
        const headY = shepherd.y;
        const headLeftTile  = getTileAt(shepherd.x + 20, headY);
        const headRightTile = getTileAt(shepherd.x + shepherd.width - 20, headY);

        if (isSolid(headLeftTile) || isSolid(headRightTile)) {
            const tileBottom = Math.ceil(headY / worldTileSize) * worldTileSize;
            shepherd.y = tileBottom;
            shepherd.vy = 0;
        }
    }

    /* walking animation */
    if (shepherd.onGround && Math.abs(shepherd.vx) > 0.5) {
        if (timestamp - shepherd.lastWalkTime > SHEPHERD_WALK_INTERVAL) {
            shepherd.walkFrame = (shepherd.walkFrame + 1) % 6;
            shepherd.lastWalkTime = timestamp;
        }
    }

    /* ----- SHEEP ----- */
    sheepList.forEach(s => {
        s.x += s.vx;

        // simple horizontal tile collision (sheep have no gravity in this version)
        const midY = s.y + s.height / 2;
        if (s.vx > 0) {
            if (isSolid(getTileAt(s.x + s.width - 10, midY))) {
                s.x = Math.floor((s.x + s.width) / tileWidth) * tileWidth - s.width + 10;
                s.vx *= -1;
            }
        } else if (s.vx < 0) {
            if (isSolid(getTileAt(s.x + 10, midY))) {
                s.x = Math.ceil(s.x / tileWidth) * tileWidth - 10;
                s.vx *= -1;
            }
        }

        // animation
        if (timestamp - s.lastFrameTime > SHEEP_WALK_INTERVAL) {
            s.frameIndex = (s.frameIndex + 1) % 8;
            s.lastFrameTime = timestamp;
        }

        // existing shepherd ↔ sheep bump
        if (isColliding(shepherd, s)) {
            resolveHorizontalCollision(shepherd, s);
        }
    });

    /* ----- CAMERA (centered on shepherd) ----- */
cameraX = shepherd.x + drawSize / 2 - VIRTUAL_WIDTH / 2;
cameraX = Math.max(0, Math.min(cameraX, mapWidth * worldTileSize - VIRTUAL_WIDTH));

cameraY = shepherd.y + drawSize / 2 - VIRTUAL_HEIGHT / 2;
cameraY = Math.max(0, Math.min(cameraY, mapHeight * worldTileSize - VIRTUAL_HEIGHT));

    /* ----- RENDER ----- */
    ctx.clearRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

    drawTiles();
    sheepList.forEach(drawOneSheep);
    drawShepherd();

    requestAnimationFrame(update);
}

/* ================= COLLISION (unchanged from your original) ================= */

function isColliding(a, b) {
    const A = getCollider(a);
    const B = getCollider(b);
    return (
        A.left < B.right &&
        A.right > B.left &&
        A.top < B.bottom &&
        A.bottom > B.top
    );
}

function resolveHorizontalCollision(a, b) {
    const A = getCollider(a);
    const B = getCollider(b);
    const overlapLeft = B.right - A.left;
    const overlapRight = A.right - B.left;
    if (overlapLeft < overlapRight) {
        b.x -= overlapLeft;
    } else {
        b.x += overlapRight;
    }
    b.vx *= -1;
}

/* ================= ASSET LOADING ================= */

function onAssetLoad() {
    assetsLoaded++;
    if (assetsLoaded === TOTAL_ASSETS) {
        requestAnimationFrame(update);
    }
}

sheepImg.onload = onAssetLoad;
shepherdImg.onload = onAssetLoad;
tilesheet.onload = onAssetLoad;

</script>
